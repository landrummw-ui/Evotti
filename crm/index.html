<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Evotti CRM</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%23a83435'/><text x='16' y='24' font-family='Segoe UI,Helvetica,Arial,sans-serif' font-size='21' font-weight='700' fill='%23ffffff' text-anchor='middle'>E</text></svg>">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="topbar">
  <a class="lockup" href="../" title="Back to Evotti Apps">
    <img src="../assets/evotti-logo-white.png" alt="Evotti">
    <span class="rule"></span>
    <span class="sub">CRM</span>
  </a>

  <nav class="nav">
    <a href="#/activity"  data-nav="activity">Activity</a>
    <a href="#/companies" data-nav="companies">Companies</a>
    <a href="#/people"    data-nav="people">People</a>
  </nav>

  <div class="topbar-right">
    <span class="sync" id="sync" title="Live — the CRM polls for changes">
      <span class="sync-dot"></span><span id="sync-label">Live</span>
    </span>
  </div>
</header>

<main id="view" class="view"></main>

<div class="modal-backdrop" id="modal-backdrop" hidden>
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <h2 id="modal-title"></h2>
    <form id="modal-form" autocomplete="off"></form>
  </div>
</div>

<div class="toast" id="toast" hidden></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
