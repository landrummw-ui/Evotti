<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Evotti CRM</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%23a83435'/><text x='16' y='24' font-family='Segoe UI,Helvetica,Arial,sans-serif' font-size='21' font-weight='700' fill='%23ffffff' text-anchor='middle'>E</text></svg>">
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-content: center;
    justify-items: center;
    gap: 20px;
    text-align: center;
    background: #0b0b0d;
    color: #f4f5f7;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto,
                 Helvetica, Arial, sans-serif;
    padding: 24px;
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0 0 auto 0;
    height: 420px;
    background: radial-gradient(ellipse 80% 100% at 50% 0%,
                rgba(168, 52, 53, 0.13), transparent 70%);
    pointer-events: none;
  }
  img { height: 40px; width: auto; position: relative; }
  .mark {
    position: relative;
    font-size: 11px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: #d2565a;
  }
  h1 { margin: 0; position: relative; font-size: 26px; font-weight: 650; }
  p { margin: 0; position: relative; color: #8b8e97; }
  a {
    position: relative;
    color: #8b8e97;
    font-size: 13px;
    text-decoration: none;
    border-bottom: 1px solid #26282e;
    padding-bottom: 2px;
  }
  a:hover { color: #f4f5f7; border-color: #d2565a; }
</style>
</head>
<body>
  <img src="../assets/evotti-logo-white.png" alt="Evotti">
  <div class="mark">Evotti CRM</div>
  <h1>Under construction</h1>
  <p>This is where the CRM lands.</p>
  <a href="../">&larr; Back to Evotti Apps</a>
</body>
</html>
