<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Evotti Apps</title>
<meta name="description" content="Internal application platform for Evotti Boats.">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%23a83435'/><text x='16' y='24' font-family='Segoe UI,Helvetica,Arial,sans-serif' font-size='21' font-weight='700' fill='%23ffffff' text-anchor='middle'>E</text></svg>">
<link rel="stylesheet" href="/platform/platform.css">
</head>
<body>

<header class="appbar">
  <a class="lockup" href="/">
    <img src="/assets/evotti-logo-black.png" alt="Evotti">
    <span class="rule"></span>
    <span class="sub">Apps</span>
  </a>
  <span class="spacer"></span>
  <div class="switcher">
    <span class="lbl">Viewing as</span>
    <span class="sw-group" id="switch"></span>
    <span class="demo-badge">Demo</span>
  </div>
</header>
<div class="appbar-line"></div>

<div class="wrap">
  <section class="hero">
    <p class="eyebrow" id="eyebrow">The Evolution Begins</p>
    <h1 id="title">Every tool your team runs on, in one place.</h1>
    <p id="sub">&nbsp;</p>
  </section>

  <div id="dealer-pick"></div>
  <main class="grid" id="tiles"></main>

  <div class="foot">
    <span>Evotti Apps &mdash; internal platform</span>
    <span>Elkhart, Indiana</span>
  </div>
</div>

<script>
  // Self-contained demo of the persona-driven platform (no login required).
  // Real access control gets wired up after the demo; this mirrors the model.
  var SVG = function (paths) {
    return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" ' +
      'stroke-linecap="round" stroke-linejoin="round">' + paths + "</svg>";
  };
  var TILES = {
    crm: {
      title: "Evotti CRM",
      desc: "Track Boat Builder leads from first configuration through dealer assignment, quote, and delivered build.",
      href: "/crm/", status: "live", color: "#a83435",
      icon: SVG('<circle cx="9" cy="8" r="3.2"/><path d="M3.6 19.5a5.4 5.4 0 0 1 10.8 0"/><path d="M15.5 5.4a3.2 3.2 0 0 1 0 5.9"/><path d="M17.8 19.5a5.4 5.4 0 0 0-2.3-4.4"/>')
    },
    sales: {
      title: "Sales Analysis",
      desc: "Daily actuals against plan by region and product line, with an agent that answers questions in plain English.",
      href: "/sales/", status: "live", color: "#17786b",
      icon: SVG('<path d="M4 4v16h16"/><rect x="7" y="11" width="2.6" height="6" rx="0.6"/><rect x="11.7" y="7.5" width="2.6" height="9.5" rx="0.6"/><rect x="16.4" y="13.5" width="2.6" height="3.5" rx="0.6"/>')
    },
    ai_dev: {
      title: "AI App & Agent Development",
      desc: "Manage the delivery lifecycle of AI applications and agents on a Kanban board — from request through go-live.",
      href: "/dev/", status: "live", color: "#5a54c9",
      icon: SVG('<rect x="3" y="4" width="4.5" height="16" rx="1"/><rect x="9.75" y="4" width="4.5" height="10" rx="1"/><rect x="16.5" y="4" width="4.5" height="13" rx="1"/>')
    },
    dealer_portal: {
      title: "Dealer Portal",
      desc: "A dealer's queue, quoting tools, and shared visibility into build status.",
      href: "#", status: "planned", color: "#b5761f",
      icon: SVG('<path d="M4.5 9.5 6 5h12l1.5 4.5"/><path d="M5 9.5v9.5h14V9.5"/><path d="M4.5 9.5a2.4 2.4 0 0 0 4.9 0 2.4 2.4 0 0 0 4.9 0 2.4 2.4 0 0 0 4.7 0"/><path d="M9.5 19v-4.5h5V19"/>')
    },
    build: {
      title: "Build Tracker",
      desc: "Follow a hull from order through the floor to shipment, with dates dealers and buyers can rely on.",
      href: "#", status: "planned", color: "#2f6f8f",
      icon: SVG('<path d="M4 14.5h16l-1.8 3.8a2 2 0 0 1-1.8 1.2H7.6a2 2 0 0 1-1.8-1.2z"/><path d="M9 14.5V4l6.5 4.2L9 10.5"/>')
    },
    warranty: {
      title: "Warranty & Service",
      desc: "Log claims against a specific hull, route them to the dealer, and spot issues repeating across a series.",
      href: "#", status: "planned", color: "#3f7d54",
      icon: SVG('<path d="M12 3.2 19 6v5.5c0 4.3-2.9 7.3-7 8.8-4.1-1.5-7-4.5-7-8.8V6z"/><path d="M9 12l2.1 2.1L15.2 10"/>')
    },
    pricing: {
      title: "Options & Pricing",
      desc: "One source of truth for configurations and price, feeding the Boat Builder and every dealer quote.",
      href: "#", status: "planned", color: "#9a6b1f",
      icon: SVG('<path d="M20.4 12.7 12.3 4.6a2 2 0 0 0-1.4-.6H5a1 1 0 0 0-1 1v5.9a2 2 0 0 0 .6 1.4l8.1 8.1a2 2 0 0 0 2.8 0l4.9-4.9a2 2 0 0 0 0-2.8z"/><circle cx="8" cy="8" r="1.3"/>')
    }
  };

  var PERSONAS = [
    { key: "leadership", name: "Leadership",          dealer: false, tiles: ["crm", "sales", "ai_dev", "dealer_portal", "build", "warranty", "pricing"] },
    { key: "sales",      name: "Sales",               dealer: false, tiles: ["crm", "sales", "ai_dev", "dealer_portal", "pricing"] },
    { key: "controller", name: "Controller",          dealer: false, tiles: ["sales", "ai_dev", "build", "warranty", "pricing"] },
    { key: "dealer",     name: "Dealer",              dealer: true,  tiles: ["build", "warranty", "pricing"] }
  ];

  var DEALERS = [
    { name: "Great Lakes Marine",  region: "Great Lakes", city: "Elkhart",    state: "IN" },
    { name: "Harborline Boats",    region: "Southeast",   city: "Charleston", state: "SC" },
    { name: "Gulf Coast Yachts",   region: "Gulf",        city: "Tampa",      state: "FL" },
    { name: "Bay State Marine",    region: "Northeast",   city: "Newport",    state: "RI" },
    { name: "Cascade Watersports", region: "West",        city: "Seattle",    state: "WA" }
  ];

  var current = "leadership", dealerIdx = 0;
  var $ = function (id) { return document.getElementById(id); };

  function esc(s) {
    return String(s == null ? "" : s).replace(/[&<>"]/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
    });
  }

  function persona(key) {
    for (var i = 0; i < PERSONAS.length; i++) if (PERSONAS[i].key === key) return PERSONAS[i];
  }

  function renderSwitch() {
    $("switch").innerHTML = PERSONAS.map(function (p) {
      return '<button class="sw-btn' + (p.key === current ? " active" : "") +
        '" data-k="' + p.key + '">' + esc(p.name) + "</button>";
    }).join("");
    Array.prototype.forEach.call(document.querySelectorAll(".sw-btn"), function (b) {
      b.onclick = function () { current = b.getAttribute("data-k"); render(); };
    });
  }

  function render() {
    renderSwitch();
    var p = persona(current);
    if (p.dealer) return renderDealer(p);

    $("eyebrow").textContent = "The Evolution Begins";
    $("title").textContent = "Every tool your team runs on, in one place.";
    $("sub").textContent = "Viewing as " + p.name + " — here's what this role sees when they sign in.";
    $("dealer-pick").innerHTML = "";
    renderTiles(p.tiles);
  }

  function renderDealer(p) {
    var d = DEALERS[dealerIdx];
    $("eyebrow").textContent = d.region + " · Dealer Portal";
    $("title").textContent = d.name;
    $("sub").textContent = "What a dealer sees when they log in — their queue, builds in progress, and warranty activity for " + d.name + ".";
    $("dealer-pick").innerHTML =
      '<div class="dealer-pick">Dealer <select id="dsel">' +
      DEALERS.map(function (dd, i) {
        return '<option value="' + i + '"' + (i === dealerIdx ? " selected" : "") + ">" +
          esc(dd.name + " · " + dd.region) + "</option>";
      }).join("") + "</select></div>";
    $("dsel").onchange = function () { dealerIdx = +this.value; render(); };
    renderTiles(p.tiles);
  }

  function renderTiles(keys) {
    $("tiles").innerHTML = keys.map(function (k) {
      var t = TILES[k]; if (!t) return "";
      var live = t.status === "live";
      var style = t.color ? ' style="--tile:' + t.color + '"' : "";
      var inner =
        (t.icon ? '<div class="tile-icon">' + t.icon + "</div>" : "") +
        "<h2>" + esc(t.title) + "</h2><p>" + esc(t.desc) + "</p>" +
        '<footer><span class="dot"></span> ' + (live ? "Live" : "Planned") +
        (live ? '<span class="arrow">&rarr;</span>' : "") + "</footer>";
      return live
        ? '<a class="tile live"' + style + ' href="' + t.href + '">' + inner + "</a>"
        : '<div class="tile soon"' + style + ">" + inner + "</div>";
    }).join("");
  }

  render();
</script>
</body>
</html>
