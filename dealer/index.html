<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dealer Portal — Evotti</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%23a83435'/><text x='16' y='24' font-family='Segoe UI,Helvetica,Arial,sans-serif' font-size='21' font-weight='700' fill='%23ffffff' text-anchor='middle'>E</text></svg>">
<link rel="stylesheet" href="/platform/platform.css">
</head>
<body>

<header class="appbar">
  <a class="lockup" href="/dealer/">
    <img src="/assets/evotti-logo-black.png" alt="Evotti">
    <span class="rule"></span>
    <span class="sub">Dealer</span>
  </a>
  <span class="spacer"></span>
  <div id="user"></div>
</header>
<div class="appbar-line"></div>

<div class="wrap">
  <section class="hero">
    <p class="eyebrow" id="dealer-region">Dealer Portal</p>
    <h1 id="dealer-name">&nbsp;</h1>
    <p id="dealer-sub">&nbsp;</p>
  </section>

  <main class="grid" id="tiles"></main>

  <div class="foot"><span>Evotti Dealer Portal</span><span id="dealer-loc"></span></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/platform/config.js"></script>
<script src="/platform/platform.js"></script>
<script>
  // Dealers stay here; Leadership may preview. Everyone else goes home.
  Evotti.gate({ allowDealerHere: true }).then(function (profile) {
    if (!profile) return;
    var key = profile.persona && profile.persona.key;
    var isDealer = profile.persona && profile.persona.is_dealer;
    if (!isDealer && key !== "leadership") { location.href = "/"; return; }

    document.getElementById("user").innerHTML = Evotti.userMenu(profile);
    Evotti.wireUserMenu();

    var d = profile.dealer;
    if (d) {
      document.getElementById("dealer-region").textContent = (d.region || "Dealer") + " · Dealer Portal";
      document.getElementById("dealer-name").textContent = d.name;
      document.getElementById("dealer-sub").textContent =
        "Your queue, builds in progress, and warranty activity — everything for " + d.name + ".";
      document.getElementById("dealer-loc").textContent =
        [d.city, d.state].filter(Boolean).join(", ");
    } else {
      document.getElementById("dealer-name").textContent = "Dealer Portal";
      document.getElementById("dealer-sub").textContent =
        key === "leadership" ? "Leadership preview of the dealer experience." :
        "No dealer company linked to your account yet.";
    }

    // Dealer home always shows the dealer persona's tiles.
    Evotti.client.from("personas").select("id").eq("key", "dealer").single()
      .then(function (r) {
        var id = r.data ? r.data.id : (isDealer ? profile.persona.id : 4);
        return Evotti.tilesFor(id);
      })
      .then(renderTiles);
  });

  function renderTiles(tiles) {
    var g = document.getElementById("tiles");
    if (!tiles.length) { g.innerHTML = '<p style="color:var(--muted)">No tiles yet.</p>'; return; }
    g.innerHTML = tiles.map(function (t) {
      var live = t.status === "live";
      var inner =
        "<h2>" + Evotti.esc(t.title) + "</h2>" +
        "<p>" + Evotti.esc(t.description || "") + "</p>" +
        '<footer><span class="dot"></span> ' + (live ? "Live" : "Planned") +
        (live ? '<span class="arrow">&rarr;</span>' : "") + "</footer>";
      return live
        ? '<a class="tile live" href="/' + Evotti.esc(t.href) + '">' + inner + "</a>"
        : '<div class="tile soon">' + inner + "</div>";
    }).join("");
  }
</script>
</body>
</html>
